<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人摄影作品集 | 摄友交流</title>
    <style>
        :root {
            --bg-main: #0d0d0f;
            --bg-card: #18181c;
            --bg-nav: rgba(20,20,24,0.85);
            --bg-footer: #121215;
            --color-text: #e8e8e8;
            --color-subtext: #aaa;
            --color-accent: #8fb3c9;
            --color-border: #2a2a30;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', '思源黑体', sans-serif;
            scroll-behavior: smooth;
        }
        body {
            background: var(--bg-main);
            color: var(--color-text);
            padding-top: 70px;
        }
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 5%;
            background: var(--bg-nav);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 99;
            border-bottom: 1px solid var(--color-border);
        }
        .nav-menu a {
            margin-left: 1.5rem;
            text-decoration: none;
            color: #b8b8b8;
        }
        .nav-menu a.active {
            color: var(--color-accent);
        }
        .community-container {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 5%;
        }
        .title {
            text-align: center;
            margin-bottom: 20px;
        }
        .tips {
            background: var(--bg-card);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            color: var(--color-subtext);
            margin-bottom: 30px;
        }
        .comment-box {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 16px;
        }
        footer {
            text-align: center;
            padding: 25px;
            background: var(--bg-footer);
            color: #666;
        }
        .back-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 45px;
            height: 45px;
            background: var(--color-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: 0.3s;
        }
        .back-top.active {
            opacity: 1;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">LENS | 摄影</div>
    <div class="nav-menu">
        <a href="index.html">首页</a>
        <a href="works.html">作品</a>
        <a href="about.html">关于我</a>
        <a href="community.html" class="active">摄友交流</a>
    </div>
</nav>

<div class="community-container">
    <h2 class="title">📷 摄友交流区</h2>
    <div class="tips">使用 GitHub 账号登录即可评论，所有访客可见～</div>
    <div class="comment-box">
        <!-- ========== 在这里粘贴你复制的 Giscus 完整代码 ========== -->
        <script src="https://giscus.app/client.js"
        data-repo="boofan126/skyfan"
        data-repo-id="R_kgDOSM6vYg"
        data-category="[在此输入分类名]"
        data-category-id="[在此输入分类 ID]"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="zh-CN"
        crossorigin="anonymous"
        async>
</script>
    </div>
</div>

<footer>© 2026 Sky Fan | 以光影为诗，记录世间美好</footer>
<div class="back-top" id="backTop">↑</div>

<script>
    const btn = document.getElementById('backTop');
    window.addEventListener('scroll', () => {
        btn.classList.toggle('active', window.scrollY > 300);
    });
    btn.onclick = () => window.scrollTo({top:0,behavior:'smooth'});
</script>

</body>
</html>
