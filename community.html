<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄友交流 | Community</title>
    <style>
        :root {
            --bg-main: #0d0d0f;
            --bg-card: #18181c;
            --bg-nav: rgba(20, 20, 24, 0.85);
            --bg-footer: #121215;
            --color-text: #e8e8e8;
            --color-subtext: #aaa;
            --color-accent: #8fb3c9;
            --color-border: #2a2a30;
            --shadow-card: 0 3px 15px rgba(0,0,0,0.35);
            --transition-base: 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', '思源黑体', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-main);
            color: var(--color-text);
            line-height: 1.6;
            padding-top: 70px;
        }

        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 5%;
            background: var(--bg-nav);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 99;
            border-bottom: 1px solid var(--color-border);
            transition: var(--transition-base);
        }

        nav.scroll {
            padding: 0.7rem 5%;
            background: rgba(16, 16, 20, 0.95);
        }

        .logo {
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #ffffff;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-menu a {
            margin-left: 1rem;
            text-decoration: none;
            color: #b8b8b8;
            font-weight: 400;
            font-size: 0.85rem;
            transition: var(--transition-base);
            position: relative;
        }

        .nav-menu a.active {
            color: var(--color-accent);
        }

        .nav-menu a:hover {
            color: var(--color-accent);
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--color-accent);
            transition: var(--transition-base);
        }

        .nav-menu a:hover::after,
        .nav-menu a.active::after {
            width: 100%;
        }

        /* 语言切换按钮 */
        #langBtn {
            padding: 4px 10px;
            background: var(--bg-card);
            border: 1px solid var(--color-border);
            border-radius: 4px;
            color: var(--color-text);
            font-size: 0.75rem;
            cursor: pointer;
            transition: var(--transition-base);
        }
        #langBtn:hover {
            background: var(--color-accent);
            color: #000;
        }

        /* 交流区主体 */
        .community-container {
            max-width: 1200px;
            margin: 20px auto 40px;
            padding: 0 5%;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 500;
            color: #fff;
            margin-bottom: 8px;
        }

        .section-desc {
            font-size: 0.8rem;
            color: var(--color-subtext);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* 评论区容器 */
        .comment-wrapper {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--color-border);
            min-height: 300px;
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.8rem;
            background: var(--bg-footer);
        }

        /* 回到顶部按钮 */
        .back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: var(--color-accent);
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition-base);
            z-index: 90;
            font-size: 16px;
        }

        .back-to-top.active {
            opacity: 1;
            pointer-events: all;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav id="mainNav">
        <div class="logo" data-zh="LENS | 摄影" data-en="LENS | Photography">LENS | 摄影</div>
        <div class="nav-right">
            <div class="nav-menu">
                <a href="index.html" data-zh="首页" data-en="Home">首页</a>
                <a href="works.html" data-zh="作品" data-en="Works">作品</a>
                <a href="community.html" class="active" data-zh="摄友交流" data-en="Community">摄友交流</a>
            </div>
            <button id="langBtn">EN</button>
        </div>
    </nav>

    <!-- 交流区主体 -->
    <div class="community-container">
        <h2 class="section-title" data-zh="摄友交流区" data-en="Photographer Community">摄友交流区</h2>
        <p class="section-desc" data-zh="欢迎交流拍摄心得、构图技巧、器材使用，文明发言，共同进步～" data-en="Welcome to share shooting experience, composition skills, equipment usage. Be polite and progress together!">欢迎交流拍摄心得、构图技巧、器材使用，文明发言，共同进步～</p>
        
        <!-- Giscus 评论区（粘贴你之前生成的代码在这里） -->
        <div class="comment-wrapper" id="giscus-comment"></div>
    </div>

    <!-- 页脚 -->
    <footer>
        <p data-zh="© 2026 Sky Fan | 以光影为诗，记录世间美好" data-en="© 2026 Sky Fan | Capturing Beauty with Light">© 2026 Sky Fan | 以光影为诗，记录世间美好</p>
    </footer>

    <!-- 回到顶部按钮 -->
    <div class="back-to-top" id="backToTop">↑</div>

    <script>
        // ==============================================
        // 1. 语言切换功能
        // ==============================================
        let isEnglish = false;
        const langBtn = document.getElementById('langBtn');
        
        langBtn.addEventListener('click', () => {
            isEnglish = !isEnglish;
            langBtn.textContent = isEnglish ? '中文' : 'EN';
            document.documentElement.lang = isEnglish ? 'en' : 'zh-CN';
            
            // 切换所有双语文本
            document.querySelectorAll('[data-zh][data-en]').forEach(el => {
                el.textContent = isEnglish ? el.dataset.en : el.dataset.zh;
            });
        });

        // ==============================================
        // 2. 导航栏滚动效果
        // ==============================================
        const mainNav = document.getElementById('mainNav');
        window.addEventListener('scroll', () => {
            mainNav.classList.toggle('scroll', window.scrollY > 50);
        });

        // ==============================================
        // 3. 回到顶部功能
        // ==============================================
        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            backToTop.classList.toggle('active', window.scrollY > 300);
        });
        backToTop.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ==============================================
        // 4. Giscus 评论区（粘贴你之前复制的完整代码）
        // 示例：把下面的注释替换成你的Giscus脚本
        // ==============================================

            </script>
              </script>
</body>
</html>
