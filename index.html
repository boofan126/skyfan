<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人摄影作品集 | 首页</title>
    <style>
        :root {
            --bg-main: #0d0d0f;
            --bg-card: #18181c;
            --bg-nav: rgba(20, 20, 24, 0.85);
            --bg-footer: #121215;
            --color-text: #e8e8e8;
            --color-subtext: #aaa;
            --color-accent: #8fb3c9;
            --color-border: #2a2a30;
            --shadow-card: 0 3px 15px rgba(0,0,0,0.35);
            --transition-base: 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', '思源黑体', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-main);
            color: var(--color-text);
            line-height: 1.6;
            padding-top: 70px;
        }

        /* 导航栏优化 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.2rem 5%;
            background: var(--bg-nav);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 99;
            border-bottom: 1px solid var(--color-border);
            transition: var(--transition-base);
        }

        nav.scroll {
            padding: 0.8rem 5%;
            background: rgba(16, 16, 20, 0.95);
        }

        .logo {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #ffffff;
        }

        .nav-menu a {
            margin-left: 2rem;
            text-decoration: none;
            color: #b8b8b8;
            font-weight: 400;
            transition: var(--transition-base);
            position: relative;
        }

        .nav-menu a.active {
            color: var(--color-accent);
        }

        .nav-menu a:hover {
            color: var(--color-accent);
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--color-accent);
            transition: var(--transition-base);
        }

        .nav-menu a:hover::after,
        .nav-menu a.active::after {
            width: 100%;
        }

        /* 英雄区 */
        .hero {
            max-width: 1200px;
            margin: 60px auto 60px;
            padding: 0 5%;
            display: flex;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid var(--color-border);
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: var(--transition-base);
        }

        .avatar:hover {
            transform: scale(1.05);
        }

        .intro-card {
            flex: 1;
            min-width: 300px;
            background: var(--bg-card);
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .intro-card h2 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            font-weight: 500;
            color: #fff;
        }

        .intro-card .tag {
            display: inline-block;
            padding: 4px 12px;
            background: #25252b;
            border-radius: 20px;
            font-size: 0.85rem;
            margin: 4px 6px 4px 0;
            color: var(--color-accent);
        }

        /* 过滤栏 */
        .filter {
            max-width: 1200px;
            margin: 0 auto 40px;
            padding: 0 5%;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-item {
            padding: 8px 20px;
            background: var(--bg-card);
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition-base);
            border: 1px solid var(--color-border);
            color: #ccc;
        }

        .filter-item.active,
        .filter-item:hover {
            background: var(--color-accent);
            color: #000;
            border-color: var(--color-accent);
        }

        /* 作品容器 */
        .work-container {
            max-width: 1200px;
            margin: 0 auto 80px;
            padding: 0 5%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .work-item {
            border-radius: 12px;
            overflow: hidden;
            background: var(--bg-card);
            box-shadow: var(--shadow-card);
            transition: 0.4s ease;
            cursor: pointer;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .work-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.45);
        }

        .work-item img {
            width: 100%;
            height: 360px;
            object-fit: cover;
            display: block;
            transition: var(--transition-base);
            loading: lazy; /* 懒加载 */
        }

        .work-item:hover img {
            transform: scale(1.03);
        }

        .work-desc {
            padding: 16px;
            font-size: 0.9rem;
            color: var(--color-subtext);
        }

        /* 交流区 */
        .comment-area {
            max-width: 1200px;
            margin: 0 auto 80px;
            padding: 0 5%;
        }

        .section-title {
            font-size: 1rem;
            margin-bottom: 16px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--color-border);
            color: #fff;
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 0.9rem;
            background: var(--bg-footer);
        }

        /* 图片模态框 */
        .img-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }

        .img-modal.active {
            display: flex;
        }

        .img-modal img {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 8px;
            object-fit: contain;
        }

        .img-modal .close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #fff;
            font-size: 36px;
            cursor: pointer;
            opacity: 0.7;
            transition: var(--transition-base);
        }

        .img-modal .close:hover {
            opacity: 1;
        }

        /* 回到顶部按钮 */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 48px;
            height: 48px;
            background: var(--color-accent);
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition-base);
            z-index: 90;
            font-size: 20px;
        }

        .back-to-top.active {
            opacity: 1;
            pointer-events: all;
        }

        /* 响应式优化 */
        @media (max-width:768px) {
            .nav-menu a {
                margin-left: 1rem;
                font-size: 0.9rem;
            }
            .hero {
                justify-content: center;
                text-align: center;
                margin-top: 40px;
            }
            .avatar {
                width: 120px;
                height: 120px;
            }
            .work-item img {
                height: 280px;
            }
            .back-to-top {
                width: 40px;
                height: 40px;
                bottom: 20px;
                right: 20px;
            }
            .img-modal .close {
                top: 20px;
                right: 20px;
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav id="mainNav">
        <div class="logo">LENS | 摄影</div>
        <div class="nav-menu">
            <a href="index.html" class="active">首页</a>
            <a href="works.html">作品</a>
            <a href="about.html">关于我</a>
            <a href="community.html">摄友交流</a>
        </div>
    </nav>

    <!-- 英雄区 -->
    <div class="hero">
        <img src="img/avatar.jpg" alt="头像" class="avatar">
        <div class="intro-card">
            <h2>悉尼|境界</h2>
            <p>专注风光 / 街拍 / 人像纪实摄影<br>
            00后独立摄影老炮（超10年摄龄）。</p>
            <p>热爱自然光与城市烟火，用镜头定格每一个温柔瞬间。</p>
            <div style="margin:12px 0;">
                <span class="tag">#风光摄影</span>
                <span class="tag">#纪实</span>
                <span class="tag">#城市街拍</span>
            </div>
            <p style="font-size:0.9rem;color:#aaa;">📩 交流邮箱：2891413723@qq.com<br>
            欢迎同好互相交流、学习进步</p>
        </div>
    </div>

    <!-- 过滤栏 -->
    <div class="filter" id="filterBox">
        <div class="filter-item active" data-filter="all">全部作品</div>
        <div class="filter-item" data-filter="风光">风光摄影</div>
        <div class="filter-item" data-filter="人像">人像写真</div>
        <div class="filter-item" data-filter="街拍">城市街拍</div>
        <div class="filter-item" data-filter="纪实">新闻纪实</div>
    </div>

    <!-- 作品容器 -->
    <div class="work-container" id="workBox"></div>

    <!-- 交流区入口 -->
    <div class="comment-area">
        <h3 class="section-title">摄友交流区</h3>
        <p style="color:#aaa;margin-bottom:20px;">欢迎留言交流拍摄心得、器材、构图与光影技巧，一起进步。</p>
        <a href="community.html" style="display:inline-block;padding:10px 24px;background:var(--color-accent);color:#000;border-radius:8px;text-decoration:none;transition:var(--transition-base);">
            进入交流区
        </a>
    </div>

    <!-- 页脚 -->
    <footer>
        <p>© 2026 Sky Fan | 以光影为诗，记录世间美好</p>
    </footer>

    <!-- 图片预览模态框 -->
    <div class="img-modal" id="imgModal">
        <span class="close" id="closeBtn">×</span>
        <img src="" alt="大图预览" id="modalImg">
    </div>

    <!-- 回到顶部按钮 -->
    <div class="back-to-top" id="backToTop">↑</div>

    <script>
        // 作品数据（含分类）
        const workData = [
            { src: "p0001.jpg", desc: "山野日落 | 自然光影", category: "风光" },
            { src: "p0002.jpg", desc: "城市暮色 | 街头纪实", category: "街拍" },
            { src: "p0003.jpg", desc: "人像自然光创作", category: "人像" },
            { src: "p0004.jpg", desc: "海边极简风光", category: "风光" },
            { src: "p0005.jpg", desc: "山林雾气纪实", category: "纪实" },
            { src: "p0006.jpg", desc: "建筑极简美学", category: "街拍" },
            { src: "p0007.jpg", desc: "晚风与旷野", category: "风光" },
            { src: "p0008.jpg", desc: "极简美学", category: "人像" },
            { src: "p0009.jpg", desc: "极简美学", category: "风光" },
            { src: "p0010.jpg", desc: "极简美学", category: "街拍" },
            { src: "p0011.jpg", desc: "极简美学", category: "纪实" },
            { src: "p0012.jpg", desc: "夜色街景", category: "街拍" }
        ];

        // 初始化作品列表
        const workBox = document.getElementById('workBox');
        function renderWorks(filter = 'all') {
            workBox.innerHTML = '';
            const filteredWorks = filter === 'all' 
                ? workData 
                : workData.filter(item => item.category === filter);
            
            filteredWorks.forEach((item, index) => {
                const workItem = document.createElement('div');
                workItem.className = "work-item";
                workItem.style.animationDelay = `${index * 0.1}s`;
                workItem.innerHTML = `
                    <img src="img/${item.src}" alt="${item.desc}">
                    <div class="work-desc">${item.desc}</div>
                `;
                workBox.appendChild(workItem);
            });
        }

        // 初始化渲染
        renderWorks();

        // 过滤功能
        const filterItems = document.querySelectorAll('.filter-item');
        filterItems.forEach(item => {
            item.addEventListener('click', () => {
                // 移除所有active
                filterItems.forEach(btn => btn.classList.remove('active'));
                // 添加当前active
                item.classList.add('active');
                // 渲染过滤后的作品
                renderWorks(item.dataset.filter);
            });
        });

        // 大图预览
        const modal = document.getElementById('imgModal');
        const modalImg = document.getElementById('modalImg');
        const closeBtn = document.getElementById('closeBtn');

        // 点击图片预览
        document.addEventListener('click', function(e){
            if(e.target.tagName === 'IMG' && e.target.closest('.work-item')){
                modalImg.src = e.target.src;
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        });

        // 关闭模态框
        function closeModal(){
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', function(e){
            if(e.target === modal) closeModal();
        });

        // ESC键关闭模态框
        document.addEventListener('keydown', (e) => {
            if(e.key === 'Escape' && modal.classList.contains('active')){
                closeModal();
            }
        });

        // 导航栏滚动效果
        const mainNav = document.getElementById('mainNav');
        window.addEventListener('scroll', () => {
            if(window.scrollY > 50){
                mainNav.classList.add('scroll');
            } else {
                mainNav.classList.remove('scroll');
            }
        });

        // 回到顶部
        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            if(window.scrollY > 300){
                backToTop.classList.add('active');
            } else {
                backToTop.classList.remove('active');
            }
        });

        backToTop.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });
    </script>
</body>
</html>
